<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Carrinho | FF Studio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../styles/style.css">
</head>

<body class="bg-[#FDF8F3] min-h-screen">

    <nav class="bg-white shadow-sm border-b border-orange-100">
        <div class="max-w-7xl mx-auto px-4 py-5 flex justify-between items-center">

            <a href="index.html" class="flex items-center">
                <img src="../images/Logo_FFStudio.png" alt="Logo FF Studio" class="h-10 w-auto">
            </a>

            <button
                onclick="history.back()"
                class="border border-coral text-coral px-5 py-2 rounded-full hover:bg-coral hover:text-white transition">

                Voltar
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-16">

        <h1 class="text-5xl font-bold text-gray-800 mb-12">
            Seu Carrinho
        </h1>

        <div class="grid lg:grid-cols-3 gap-10">

            <div class="lg:col-span-2">

                <div id="cart-items" class="space-y-6"></div>

                <div id="empty-cart" class="hidden bg-white rounded-3xl p-12 text-center shadow-lg">

                    <i data-lucide="shopping-bag" class="w-16 h-16 mx-auto text-gray-300 mb-4"></i>

                    <h2 class="text-2xl font-bold text-gray-700 mb-2">
                        Seu carrinho está vazio
                    </h2>

                    <p class="text-gray-500 mb-6">
                        Adicione algumas peças artesanais
                    </p>

                    <a href="index.html" class="bg-coral text-white px-6 py-3 rounded-full inline-block">
                        Ver produtos
                    </a>
                </div>
            </div>

            <div>

                <div class="bg-white rounded-3xl shadow-lg p-8 sticky top-10">

                    <h2 class="text-2xl font-bold text-gray-800 mb-6">
                        Resumo
                    </h2>

                    <div class="flex justify-between mb-4">
                        <span class="text-gray-600">
                            Total
                        </span>

                        <span id="cart-total" class="text-3xl font-bold text-coral">
                            R$ 0,00
                        </span>
                    </div>

                    <a id="whatsapp-btn" href="#" target="_blank" rel="noopener noreferrer"
                        class="w-full mt-6 bg-green text-white py-4 rounded-full font-semibold flex items-center justify-center gap-3 hover:opacity-90 transition">

                        <i data-lucide="message-circle" class="w-5 h-5"></i>

                        Finalizar no WhatsApp
                    </a>

                </div>

            </div>

        </div>

    </main>

    <script>

        lucide.createIcons();

        // ==========================
        // CARRINHO
        // ==========================

        const cartItemsContainer =
            document.getElementById('cart-items');

        const emptyCart =
            document.getElementById('empty-cart');

        const cartTotal =
            document.getElementById('cart-total');

        function getCart() {
            return JSON.parse(localStorage.getItem('cart')) || [];
        }

        function saveCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function renderCart() {

            const cart = getCart();

            cartItemsContainer.innerHTML = '';

            if (cart.length === 0) {
                emptyCart.classList.remove('hidden');
                updateWhatsappButton([]);
                return;
            }

            emptyCart.classList.add('hidden');

            let total = 0;

            cart.forEach((item, index) => {

                total += item.price * item.quantity;

                const product = document.createElement('div');

                product.className =
                    'bg-white rounded-3xl shadow-lg p-6 flex justify-between items-center';

                product.innerHTML = `
                
                    <div>
                        <h3 class="text-2xl font-bold text-gray-800">
                            ${item.name}
                        </h3>
                        <div class="flex items-center gap-3 mt-3">

                            <button
                                onclick="decreaseQuantity(${index})"
                                class="w-8 h-8 rounded-full bg-orange-100 text-coral font-bold hover:bg-orange-200 transition">

                                -
                            </button>

                            <span class="text-gray-700 font-semibold">
                                ${item.quantity}
                            </span>

                            <button
                                onclick="increaseQuantity(${index})"
                                class="w-8 h-8 rounded-full bg-orange-100 text-coral font-bold hover:bg-orange-200 transition">

                                +
                            </button>

                        </div>

                        <p class="text-coral font-bold text-xl mt-2">
                            R$ ${(item.price * item.quantity).toFixed(2).replace('.', ',')}
                        </p>
                    </div>

                    <button
                        onclick="removeItem(${index})"
                        class="bg-red-100 text-red-500 px-4 py-2 rounded-full hover:bg-red-200 transition">

                        Remover
                    </button>
                `;

                cartItemsContainer.appendChild(product);
            });

            cartTotal.textContent =
                `R$ ${total.toFixed(2).replace('.', ',')}`;

            updateWhatsappButton(cart);
        }

        function removeItem(index) {

            const cart = getCart();

            cart.splice(index, 1);

            saveCart(cart);

            renderCart();
        }

        function increaseQuantity(index) {

            const cart = getCart();

            cart[index].quantity += 1;

            saveCart(cart);

            renderCart();
        }

        function decreaseQuantity(index) {

            const cart = getCart();

            if (cart[index].quantity > 1) {

                cart[index].quantity -= 1;

            } else {

                cart.splice(index, 1);
            }

            saveCart(cart);

            renderCart();
        }

        // ==========================
        // WHATSAPP
        // ==========================

        function updateWhatsappButton(cart) {

            // const phone = "5511939288314";
            const phone = "5514988082038";

            let message = "Olá! Tenho interesse nos seguintes produtos:%0A%0A";

            let total = 0;

            cart.forEach(item => {

                const subtotal = item.price * item.quantity;

                total += subtotal;

                message +=
                    `• ${item.name} - ${item.quantity}x - R$ ${subtotal.toFixed(2)}%0A`;
            });

            message += `%0ATotal: R$ ${total.toFixed(2)}`;

            const whatsappUrl =
                `https://wa.me/${phone}?text=${message}`;

            const whatsappButton =
                document.getElementById('whatsapp-btn');

            whatsappButton.href = whatsappUrl;
        }

        renderCart();

    </script>

</body>

</html>
